[build]
builder = "nixpacks"
buildCommand = "npm install && npm run build --workspace=apps/backend && ls -la /app/apps/backend/ && ls -la /app/apps/backend/dist/ 2>/dev/null || echo 'NO DIST FOLDER'"

[deploy]
startCommand = "node apps/backend/dist/main.js"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"

[variables]
NIXPACKS_NODE_VERSION = "22"